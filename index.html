<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="丁保堂 - 项目经理 / 地理信息中级工程师个人电子名片">
    <title>丁保堂 | 个人电子名片</title>
    <link rel="preload" href="assets/avatar-engineer.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-theme="minimal">
    <main class="page-shell">
      <section class="profile-card" aria-label="个人电子名片">
        <div class="theme-panel" aria-label="主题切换">
          <button class="theme-button is-active" type="button" data-theme-value="minimal" aria-pressed="true">
            极简白
          </button>
          <button class="theme-button" type="button" data-theme-value="space" aria-pressed="false">
            深空黑
          </button>
          <button class="theme-button" type="button" data-theme-value="survey" aria-pressed="false">
            测绘蓝
          </button>
          <button class="theme-button" type="button" data-theme-value="map" aria-pressed="false">
            地图绿
          </button>
        </div>

        <div class="avatar-column">
          <div class="avatar-frame">
            <img id="profile-avatar" src="assets/avatar-engineer.png" alt="个人头像">
          </div>
          <div class="avatar-actions">
            <input class="avatar-file-input" id="avatar-upload" type="file" accept="image/*" aria-label="上传头像">
            <label class="avatar-upload-button" for="avatar-upload">上传头像</label>
          </div>
          <div class="status-chip">
            <span class="status-dot"></span>
            GIS · 三维建模 · 激光扫描
          </div>
        </div>

        <div class="profile-content">
          <p class="eyebrow">Professional Digital Card</p>
          <h1>丁保堂</h1>
          <p class="role">项目经理 / 地理信息中级工程师</p>
          <p class="intro" contenteditable="plaintext-only" spellcheck="false" tabindex="0" aria-label="个人简介，可编辑">
            GIS与地理信息行业7年工作经验，精通倾斜摄影三维建模、三维激光扫描，参与过浙江省市级重点项目。
          </p>

          <div class="skill-grid" aria-label="核心能力">
            <span>项目统筹</span>
            <span>倾斜摄影三维建模</span>
            <span>三维激光扫描</span>
            <span>地理信息</span>
          </div>

          <div class="contact-actions" aria-label="联系方式">
            <a class="contact-button primary" href="tel:15717117599">
              <span class="button-icon" aria-hidden="true">☎</span>
              15717117599
            </a>
            <a class="contact-button secondary" href="mailto:547894575@qq.com">
              <span class="button-icon" aria-hidden="true">@</span>
              547894575@qq.com
            </a>
          </div>
        </div>
      </section>
    </main>

    <div class="crop-modal" id="avatar-crop-modal" hidden role="dialog" aria-modal="true" aria-labelledby="avatar-crop-title">
      <div class="crop-dialog">
        <div class="crop-header">
          <h2 id="avatar-crop-title">调整头像</h2>
          <button class="crop-close-button" id="avatar-crop-close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="crop-stage" id="avatar-crop-stage" aria-label="拖动照片调整头像位置">
          <img id="avatar-crop-image" alt="">
          <div class="crop-mask" aria-hidden="true"></div>
        </div>
        <div class="crop-actions">
          <button class="crop-secondary-button" id="avatar-crop-cancel" type="button">取消</button>
          <button class="crop-primary-button" id="avatar-crop-apply" type="button">使用头像</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
